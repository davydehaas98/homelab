argo-cd:
  global:
    revisionHistoryLimit: 0
    logging:
      format: json
      level: warn

  configs:
    cm:
      exec.enabled: true
    secret:
      createSecret: true
    params:
      server.insecure: true

  controller:
    replicas: 1
    resources:
      limits:
        memory: 2048Mi
      requests:
        cpu: 150m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  dex:
    enabled: false

  redis:
    enabled: true
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    exporter:
      enabled: true
      resources:
        limits:
          memory: 64Mi
        requests:
          cpu: 10m
          memory: 32Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  server:
    replicas: 1

    httproutes:
      enabled: true
      hostnames:
        - argocd.cloud.davydehaas.dev
      parentRefs:
        - name: envoy-gateway
          namespace: envoy-gateway
          sectionName: web-https

    configEnabled: false

    rbacConfigCreate: false

  repoServer:
    replicas: 1
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  applicationSet:
    enabled: false

  notifications:
    enabled: false
